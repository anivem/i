<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorting Hat Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top, #1a1a2e, #000);
        color: #f5f5f5;
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 800px;
        margin: auto;
        background: rgba(20, 20, 40, 0.95);
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 0 40px rgba(255, 215, 0, 0.15);
    }

    h1 {
        text-align: center;
        color: #ffd700;
        letter-spacing: 1px;
    }

    .question {
        margin-bottom: 25px;
        animation: fadeIn 0.6s ease;
    }

    .question h3 {
        margin-bottom: 12px;
    }

    .explain {
        font-size: 0.85em;
        opacity: 0.85;
        margin-bottom: 10px;
    }

    label {
        display: block;
        background: #222;
        padding: 10px 14px;
        border-radius: 8px;
        margin-bottom: 8px;
        cursor: pointer;
        transition: 0.25s;
    }

    label:hover {
        background: #333;
        transform: translateX(4px);
    }

    input[type="radio"] {
        margin-right: 10px;
    }

    button {
        display: block;
        margin: 30px auto 10px;
        padding: 14px 28px;
        font-size: 1.1em;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        background: linear-gradient(45deg, #ffd700, #ff9f00);
        color: #000;
        font-weight: bold;
    }

    #result {
        text-align: center;
        font-size: 1.3em;
        margin-top: 25px;
        animation: fadeIn 0.8s ease;
    }

    #whatsappBtn {
        display: none;
        background: #25D366;
        color: white;
        margin-top: 15px;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(10px);}
        to {opacity: 1; transform: translateY(0);}
    }
</style>
</head>

<body>
<div class="container">
    <h1>🧙‍♂️ The Sorting Hat Quiz</h1>
    <form id="quiz"></form>

    <button onclick="submitQuiz()">Reveal My House</button>

    <div id="result"></div>
    <button id="whatsappBtn" onclick="shareWhatsApp()">Share on WhatsApp</button>
</div>

<script>
const questions = [
{
q: "You’re faced with a difficult problem. What’s your instinct?",
opts: [
["Think it through calmly and logically", "R"],
["Take a bold risk and act immediately", "G"],
["Ask others and work together", "H"],
["Find a clever shortcut others missed", "S"]
]
},
{
q: "Which trait do you admire most?",
opts: [
["Bravery", "G"],
["Intelligence", "R"],
["Ambition", "S"],
["Kindness", "H"]
]
},
{
q: "A 'Patronus' is a protective spell powered by happy memories. If life gets dark, what protects you?",
explain: "Patronus = a magical shield against fear and negativity.",
opts: [
["Logic and understanding", "R"],
["Inner courage", "G"],
["Friends and loyalty", "H"],
["Strong self-belief", "S"]
]
},
{
q: "How do you usually win arguments?",
opts: [
["Facts and reasoning", "R"],
["Confidence and presence", "G"],
["Empathy and patience", "H"],
["Strategy and timing", "S"]
]
},
{
q: "Which role fits you best in a team?",
opts: [
["Planner", "R"],
["Leader", "G"],
["Supporter", "H"],
["Strategist", "S"]
]
},
{
q: "A spell called 'Expelliarmus' disarms an opponent. Your real-life version?",
explain: "Expelliarmus removes a threat without hurting.",
opts: [
["Outsmart them", "R"],
["Confront directly", "G"],
["Calm the situation", "H"],
["Turn the situation in your favor", "S"]
]
},
{
q: "Failure feels like…",
opts: [
["A lesson", "R"],
["A challenge", "G"],
["A shared burden", "H"],
["A temporary setback", "S"]
]
},
{
q: "Pick a study style.",
opts: [
["Deep understanding", "R"],
["Last-minute adrenaline", "G"],
["Group study", "H"],
["Focused and goal-based", "S"]
]
},
{
q: "If rules block progress, you…",
opts: [
["Question them", "R"],
["Break them", "G"],
["Respect them", "H"],
["Use them smartly", "S"]
]
},
{
q: "Your friends trust you because you’re…",
opts: [
["Wise", "R"],
["Fearless", "G"],
["Reliable", "H"],
["Capable", "S"]
]
},
{
q: "What motivates you most?",
opts: [
["Knowledge", "R"],
["Glory", "G"],
["Belonging", "H"],
["Success", "S"]
]
},
{
q: "Which sounds worst?",
opts: [
["Being ignorant", "R"],
["Being cowardly", "G"],
["Being alone", "H"],
["Being powerless", "S"]
]
},
{
q: "A 'Horcrux' is something a dark wizard hides their soul in. What would you never sacrifice?",
explain: "Horcrux = symbol of what you protect at all costs.",
opts: [
["Truth", "R"],
["Honor", "G"],
["People", "H"],
["Future goals", "S"]
]
},
{
q: "You prefer decisions that are…",
opts: [
["Well-researched", "R"],
["Bold", "G"],
["Fair", "H"],
["Effective", "S"]
]
},
{
q: "Your greatest strength?",
opts: [
["Thinking", "R"],
["Courage", "G"],
["Loyalty", "H"],
["Determination", "S"]
]
},
{
q: "What annoys you most?",
opts: [
["Illogic", "R"],
["Fear", "G"],
["Cruelty", "H"],
["Weakness", "S"]
]
},
{
q: "Pick a motto.",
opts: [
["Knowledge is power", "R"],
["Fortune favors the brave", "G"],
["Together we stand", "H"],
["Aim higher", "S"]
]
},
{
q: "How do you handle pressure?",
opts: [
["Analyze", "R"],
["Push forward", "G"],
["Lean on others", "H"],
["Adapt fast", "S"]
]
},
{
q: "Success means…",
opts: [
["Understanding the world", "R"],
["Proving yourself", "G"],
["Helping others", "H"],
["Reaching the top", "S"]
]
},
{
q: "Your legacy should be…",
opts: [
["Wisdom", "R"],
["Bravery", "G"],
["Kindness", "H"],
["Achievement", "S"]
]
}
];

const houseNames = {
G: "🦁 Gryffindor – Brave, bold, and action-first",
R: "🦅 Ravenclaw – Intelligent, thoughtful, and curious",
H: "🦡 Hufflepuff – Loyal, fair, and kind-hearted",
S: "🐍 Slytherin – Ambitious, strategic, and driven"
};

let scores = {G:0, R:0, H:0, S:0};

function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

function loadQuiz() {
    const form = document.getElementById("quiz");
    shuffle(questions).forEach((q, i) => {
        const div = document.createElement("div");
        div.className = "question";

        let html = `<h3>${i+1}. ${q.q}</h3>`;
        if(q.explain) html += `<div class="explain">${q.explain}</div>`;

        shuffle(q.opts).forEach(opt => {
            html += `
            <label>
                <input type="radio" name="q${i}" value="${opt[1]}">
                ${opt[0]}
            </label>`;
        });

        div.innerHTML = html;
        form.appendChild(div);
    });
}

function submitQuiz() {
    scores = {G:0, R:0, H:0, S:0};
    const inputs = document.querySelectorAll("input[type=radio]:checked");
    inputs.forEach(i => scores[i.value]++);

    const house = Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);
    const resultText = houseNames[house];

    document.getElementById("result").innerText =
        `🎩 The Sorting Hat has decided!\n\n${resultText}`;

    window.finalResult = resultText;
    document.getElementById("whatsappBtn").style.display = "block";
}

function shareWhatsApp() {
    const text = encodeURIComponent(
        `I just took the Harry Potter Sorting Hat Quiz!\n\nMy House: ${window.finalResult}\n\nTry it yourself!`
    );
    window.location.href = `https://wa.me/?text=${text}`;
}

loadQuiz();
</script>
</body>
</html>
